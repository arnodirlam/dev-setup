#:schema https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/config.schema.json

model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "friendly"
approval_policy = "on-request"
approvals_reviewer = "guardian_subagent"
sandbox_mode = "workspace-write"

[mcp_servers.context7]
args = ["--bun", "@upstash/context7-mcp"]
command = "bunx"
enabled = true

[features]
multi_agent = true
undo = true
guardian_approval = true
prevent_idle_sleep = true
workspace_dependencies = false
codex_hooks = true
multi_agent_v2 = true

[sandbox_workspace_write]
network_access = true
writable_roots = [
  "/Users/arno/.cache/nix",
  "/Users/arno/.cache/zig",
  "/Users/arno/.dev-browser",
  "/Users/arno/.hex",
  "/Users/arno/.local/share/mise",
  "/Users/arno/.mise",
  "/Users/arno/.npm",
  "/Users/arno/.ollama",
]
